<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖 Fixed Romantic Date Website</title>
<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#ffd6e7,#ffc2d6,#ffeaf3);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px}
.card{max-width:760px;width:100%;background:white;padding:30px;border-radius:24px;box-shadow:0 10px 30px rgba(0,0,0,.12);text-align:center}
.hidden{display:none}
button{padding:12px 24px;border:none;border-radius:12px;cursor:pointer;margin:8px}
.primary{background:#ff4f8b;color:#fff}
.option{text-align:left;margin:8px 0}
input,textarea{width:100%;padding:10px;margin:8px 0}
</style>
</head>
<body>
<div class="card">
<div id="p1">
<h1>💖 เรามีคำถามสำคัญจะถาม 💖</h1>
<p>🥺 เธอจะไปเดทกับเราไหม? 💗</p>
<p id="msg">เราตั้งใจชวนจริง ๆ นะ 🌷</p>
<button id="yesBtn" class="primary">💗 ไปสิ</button>
<button id="noBtn">🙈 ไม่เอา</button>
</div>

<div id="p2" class="hidden">
<h1>🎉 เย้! 🎉</h1>
<input type="date" id="date">
<input type="time" id="time">
<button class="primary" onclick="go('p3')">ต่อไป</button>
</div>

<div id="p3" class="hidden">
<h1>🌷 อยากไปทำอะไรด้วยกัน?</h1>
<div class="option"><label><input type="checkbox" value="🍦 กินไอติม"> 🍦 กินไอติม</label></div>
<div class="option"><label><input type="checkbox" value="☕ คาเฟ่"> ☕ คาเฟ่</label></div>
<div class="option"><label><input type="checkbox" value="🎬 ดูหนัง"> 🎬 ดูหนัง</label></div>
<textarea id="note" placeholder="อยากบอกอะไรเราเพิ่มเติมไหม?"></textarea>
<button type="button" class="primary" id="submitBtn">ส่งคำตอบ 💖</button>
</div>

<div id="p4" class="hidden">
<h1>💖 จองเดทสำเร็จแล้ว 💖</h1>
<div id="result"></div>
</div>
</div>

<script>
const pages=['p1','p2','p3','p4'];
function go(id){
 pages.forEach(p=>document.getElementById(p).classList.add('hidden'));
 document.getElementById(id).classList.remove('hidden');
}

const yesBtn=document.getElementById('yesBtn');
const noBtn=document.getElementById('noBtn');
const msg=document.getElementById('msg');
const result=document.getElementById('result');
const submitBtn=document.getElementById('submitBtn');

const msgs=["🥺 แน่ใจนะ","😢 แน่ใจจริงๆ เหรอ","🍦 แต่มีไอติมนะ"];
let count=0;

noBtn.addEventListener('click',()=>{
 count++;
 msg.textContent=msgs[Math.min(count-1,msgs.length-1)];
 yesBtn.style.fontSize=(1.1+count*0.15)+'rem';
});

yesBtn.addEventListener('click',()=>go('p2'));

submitBtn.addEventListener('click',finishDate);

function finishDate(){
 const date=document.getElementById('date').value||'-';
 const time=document.getElementById('time').value||'-';
 const note=document.getElementById('note').value||'ไม่มี';

 const acts=[];
 document.querySelectorAll('#p3 input[type="checkbox"]:checked')
 .forEach(el=>acts.push(el.value));

 result.innerHTML=`
 <p>📅 ${date}</p>
 <p>⏰ ${time}</p>
 <p>🎉 ${acts.length?acts.join(', '):'ยังไม่ได้เลือกกิจกรรม'}</p>
 <p>💌 ${note}</p>`;

 go('p4');
}
</script>
</body>
</html>
